<!DOCTYPE HTML>
<html>
	<head>
		<title>{{ page.title | default: site.title }}</title>
		<meta name="description" content="{{ page.description | default: site.description }}">

		<!--구글 애드센스-->
		<script async
		src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
		data-ad-client="ca-pub-3555267536702841"
		crossorigin="anonymous"></script>
		
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
		<link rel="icon" href="{{ site.baseurl }}/images/calculator.png">

		<!-- jQuery에서 제공하는 최신 버전의 jQuery URL -->
		<script src="https://code.jquery.com/jquery-latest.js"></script> 
		<link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css" />
		<script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>

		<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/index.css" />
		
		<!-- 페이지별 스타일시트가 있다면 여기에 추가될 수 있습니다. -->
		{% if page.stylesheets %}
			{% for stylesheet in page.stylesheets %}
				<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/{{ stylesheet }}" />
			{% endfor %}
		{% endif %}

		<!-- 네이버 애널리틱스 -->
		<script type="text/javascript" src="//wcs.naver.net/wcslog.js"></script>
		<script type="text/javascript">
		if(!wcs_add) var wcs_add = {};
		wcs_add["wa"] = "108c8f7a903d5e0";
		if(window.wcs) {
		wcs_do();
		}
		</script>

		<!-- 네이버 서치어드바이저 소유확인-->
		<meta name="naver-site-verification" content="50a3c473f96cc8f1f6c610b6c4a9118ca506fb08" />

		<!-- Canonical URL 설정 (중복 콘텐츠 방지) -->
		<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

		<!-- 오픈 그래프 및 트위터 카드 -->
		<meta property="og:type" content="website">
		<meta property="og:title" content="{{ page.title | default: site.title }}">
		<meta property="og:description" content="{{ page.description | default: site.description }}" />
		<meta property="og:image" content="{{ site.baseurl }}/images/mapleIcon.png" />
		<meta property="og:site_name" content="{{ site.title }}" />
		<meta property="og:url" content="{{ page.url | absolute_url }}">

		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="{{ page.title | default: site.title }}">
		<meta name="twitter:description" content="{{ page.description | default: site.description }}">
		<meta name="twitter:image" content="{{ site.baseurl }}/images/mapleIcon.png">

		<!-- JSON-LD Structured Data -->
		<script type="application/ld+json">
		{
		  "@context": "https://schema.org",
		  "@type": "WebSite",
		  "name": "{{ site.title }}",
		  "url": "{{ site.url }}",
		  "potentialAction": {
			"@type": "SearchAction",
			"target": "{{ site.url }}/?search={search_term_string}",
			"query-input": "required name=search_term_string"
		  }
		}
		</script>
		<script type="application/ld+json">
		{
		  "@context": "https://schema.org",
		  "@type": "Organization",
		  "name": "{{ site.title }}",
		  "url": "{{ site.url }}",
		  "logo": "{{ site.url }}/images/mapleIcon.png",
		  "sameAs": [
			"https://open.kakao.com/me/mesangi"
		  ]
		}
		</script>
	</head>
	<body class="is-preload sidebar-collapsed">

		<!-- 햄버거 버튼 (모바일) -->
		<div id="headerToggle">
			<a href="#header" class="toggle"></a>
		</div>

		<!-- 사이드바 토글 버튼 (데스크탑) -->
		<div id="sidebarToggle" onclick="toggleSidebar()">
			<a class="toggle"></a>
		</div>

		<!-- Header -->
		{% include header.html %}

		<!-- Main -->
		<div id="main">
			{{ content }}
		</div>

		<!-- Footer -->
		{% include footer.html %}


		<!-- Scripts -->
		<script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/jquery.scrolly.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/jquery.scrollex.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/browser.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/breakpoints.min.js"></script>
		<script src="{{ site.baseurl }}/assets/js/util.js"></script>
		<script src="{{ site.baseurl }}/assets/js/main.js"></script>
		<script src="{{ site.baseurl }}/assets/js/global.js"></script>
		<!-- 페이지별 스크립트가 있다면 여기에 추가될 수 있습니다. -->
		{% if page.scripts %}
			{% for script in page.scripts %}
				<script src="{{ site.baseurl }}/assets/js/{{ script }}"></script>
			{% endfor %}
		{% endif %}

	</body>
</html>
