---
layout: default
---

<section class="post-content four">
    <div class="container">
        <header>
            <h2 class="post-main-title">{{ page.title }}</h2>
            <p class="post-metadata">
                <span class="icon solid fa-calendar"></span> {{ page.date | date: "%Y년 %m월 %d일" }} 
                {% if page.categories %}
                | <span class="icon solid fa-folder"></span> {{ page.categories | join: ", " }}
                {% endif %}
            </p>
        </header>

        <article class="content">
            {{ content }}
        </article>

        <hr class="post-separator">
        
        <footer class="post-footer">
            <p><strong>💡 도움이 되셨나요?</strong> 다른 유용한 계산기 도구들도 확인해 보세요!</p>
            <div class="post-footer-links">
                <a href="{{ site.baseurl }}/" class="button">메인으로 가기</a>
                <a href="{{ site.baseurl }}/pages/mvpCost.html" class="button primary">MVP작 계산기</a>
            </div>
        </footer>
    </div>
</section>
